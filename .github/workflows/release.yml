name: release

# A pushed vX.Y.Z tag (via `just release`) cuts a GitHub Release with notes
# auto-generated from the PRs merged since the previous tag — which is why the
# branch/PR workflow matters: PR titles become the changelog. This does NOT
# deploy; deploys stay on push-to-main (the deploy workflow). The tag is
# a marker + notes, and the live app stamps its git-derived version itself.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency: release-${{ github.ref_name }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        # --verify-tag: only release a tag that actually exists on the remote.
        # Categorization + exclusions come from .github/release.yml.
        run: gh release create "${GITHUB_REF_NAME}" --verify-tag --generate-notes
