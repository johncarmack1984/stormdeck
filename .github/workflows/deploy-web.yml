name: deploy-web

on:
  push:
    branches: [main]
    paths: ['web/**', '.github/workflows/deploy-web.yml']
  workflow_dispatch:

# No AWS keys: the same OIDC role deploy-infra uses, which also carries
# the site-sync grants (s3 site/* + CloudFront invalidation).
permissions:
  id-token: write
  contents: read

concurrency: deploy-web

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: web
      - run: pnpm run build
        working-directory: web
        env:
          # API_BASE resolves to '' in production builds (web/src/config.ts) —
          # same origin as the tiles and weather feeds, so all fetches relative.
          BASE_PATH: /
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-2
      - name: Sync site to S3
        run: |
          BUCKET="stormdeck-$(aws sts get-caller-identity --query Account --output text)"
          # Hashed assets are immutable; index.html must always revalidate.
          aws s3 sync web/dist "s3://$BUCKET/site" --delete \
            --exclude index.html \
            --cache-control "public, max-age=31536000, immutable"
          aws s3 cp web/dist/index.html "s3://$BUCKET/site/index.html" \
            --cache-control "no-cache"
      - name: Invalidate index
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.DISTRIBUTION_ID }} \
            --paths "/" "/index.html"
